<!doctype html>
<html>
  <head>
    <title>Admin Sign In</title>
  </head>
  <h1>Sign In</h1>
  {% if error %}
  <p style="color: red">{{ error }}</p>
  {% endif %}
  <form action="{% url 'admin_signin' %}" method="POST">
    {% csrf_token %}
    <div>Email:<input type="email" name="email1" /></div>
    <div>Password:<input type="password" name="pass1" /></div>
    <div>
      <input type="submit" value="Sign In" />
    </div>
  </form>
</html>
